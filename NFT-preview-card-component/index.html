<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="style.css/style.css">
  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body>
  <h1>Proyecto NFT preview card component challenge hub - realizado por Santiago Carranza</h1>
<main class="tarjeta">
  <article class="cuadrado">
            <img src="style.css/images/image-equilibrium.jpg" alt="cuadrado-transparente">
     <div class="iconandcolor">
            <img src="style.css/images/icon-view.svg" alt="eye">
     </div>
  </article>
  <article class="txtequilibrium">
            <h2>Equilibrium #3429</h2>
            <p>Our Equilibrium collection promotes balance and calm.</p>
  </article>
  
<article class="diamondandclock">

          <div class="diamond">
             <img src="style.css/images/icon-ethereum.svg" alt="diamond">
             <span>0.041 ETH</span>
          </div>
          <div class="clock">
             <img src="style.css/images/icon-clock.svg" alt="clock">
             <span>3 days left</span>
          </div>

</article>
  
  <article class="autor">
            <img src="style.css/images/image-avatar.png" alt="">
            <p>Creation of <span>Jules Wyvern</span>
            </p>
  </article>
</main>
    <footer class="atribution">
      <div>Challenge by <a class="web" href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a></div> 
      <div>Coded by <a class="creator" href="https://github.com/santiagocarranz-a" target="_blank">Santiago Carranza</a></div>
    </footer>

</body>
</html>
